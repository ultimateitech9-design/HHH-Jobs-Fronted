# Loaded from nginx.conf's http context by the Ubuntu VPS Nginx package.
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_static on;
gzip_types
  text/plain
  text/css
  text/xml
  application/json
  application/javascript
  application/x-javascript
  application/xml
  application/rss+xml
  application/atom+xml
  image/svg+xml
  application/vnd.ms-fontobject
  font/ttf
  font/otf;

# Cache only fingerprinted frontend assets and explicitly versioned public media.
# Empty map values do not emit a Cache-Control header, so API responses stay uncached.
map $uri $hhh_static_cache_control {
  default "";
  ~^/assets/ "public, max-age=31536000, immutable";
  ~^/(?:career-compass-hero-(?:640|1024)\.webp|favicon-circle\.svg|hhh-job-logo(?:-128)?\.png)$ "public, max-age=2592000";
}

add_header Cache-Control $hhh_static_cache_control always;
